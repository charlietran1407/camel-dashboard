- rest:
    id: rest-openai
    path: /openai
    post:
      - id: post-completion
        path: /completion
        to:
          uri: direct:openai-chat
- route:
    id: openai-chat-route
    from:
      uri: direct:openai-chat
      steps:
        - convertBodyTo:
            id: convert-body-openai
            type: java.lang.String
        - to:
            id: to-openai
            uri: openai:chat-completion
            parameters:
              apiKey: "{{OPENAI_API_KEY}}"
              model: "{{OPENAI_MODEL:gpt-4o-mini}}"
              systemMessage: "You are a helpful integration assistant who explains concepts in a simple and technical manner."
