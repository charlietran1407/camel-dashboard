name: Camel Dashboard CI/CD

on:
  pull_request:
    branches: [ "main" ]   
  push:
    branches: [ "main" ]  
    tags: [ "v*" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & test for PR
        if: github.event_name == 'pull_request'
        run: |
          docker build . --file Dockerfile --tag test-image:pr
          
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push for push/tag
        if: github.event_name == 'push'
        run: |
          IMAGE=ghcr.io/${{ github.repository }}

          if [ "${{ github.ref_type }}" = "tag" ]; then
            RAW_VERSION=${{ github.ref_name }}
            VERSION=${RAW_VERSION#v}
          else
            VERSION=${{ github.ref_name }}
          fi

          docker build . --file Dockerfile --tag $IMAGE:$VERSION

          if [ "${{ github.ref_type }}" = "branch" ] && [ "${{ github.ref_name }}" = "main" ]; then
            docker tag $IMAGE:$VERSION $IMAGE:latest
            docker push $IMAGE:latest
          fi

          docker push $IMAGE:$VERSION
